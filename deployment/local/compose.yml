volumes:
  postgresql-data:
  meilisearch-data:
  flipt-data:

services:
  postgresql:
    image: postgres:18.3
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: drinkit
      POSTGRES_USER: drinkit
      POSTGRES_PASSWORD: admin

  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: true
      MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE: true

  flipt:
    image: flipt/flipt:v2.9.0
    ports:
      - "8082:8080"
    volumes:
      - flipt-data:/var/opt/flipt # TODO change to real path